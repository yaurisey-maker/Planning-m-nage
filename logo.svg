<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#E6F5F3" rx="20"/>

  <!-- Balai (broom) -->
  <g>
    <!-- Manche (handle) -->
    <rect x="85" y="30" width="8" height="120" fill="#8B6F47" rx="4"/>

    <!-- Brins de balai (broom bristles) -->
    <ellipse cx="89" cy="155" rx="35" ry="45" fill="#D4A574"/>
    <path d="M 60 155 Q 55 165 60 175" stroke="#C89968" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 75 160 Q 70 172 78 185" stroke="#C89968" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 89 162 Q 87 175 89 190" stroke="#C89968" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 103 160 Q 108 172 100 185" stroke="#C89968" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 118 155 Q 123 165 118 175" stroke="#C89968" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Nœud (tie) -->
    <rect x="75" y="148" width="28" height="6" fill="#C0564B" rx="3"/>
  </g>

  <!-- Accent géométrique -->
  <circle cx="30" cy="30" r="8" fill="#028090" opacity="0.3"/>
  <circle cx="170" cy="170" r="6" fill="#028090" opacity="0.2"/>
</svg>